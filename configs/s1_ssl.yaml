# S1 self-supervised pretraining
# Trains a multimodal encoder without labels via:
#   - temporal contrastive (CPC, with EMA teacher)
#   - masked numeric modeling
#   - cross-modal vision-numeric alignment
# Output: a checkpoint that S2 can load to start from a richer init.

seed: 0
device: cuda
epochs: 20
batch_size: 128
chart_window: 128
image_size: 128

optim:
  lr: 0.0003
  weight_decay: 0.0001
  warmup_steps: 100

ssl:
  projection_dim: 64
  hidden_dim: 128
  temperature: 0.1
  mask_ratio: 0.4
  ema_decay: 0.996
  weight_temporal: 1.0
  weight_masked: 1.0
  weight_alignment: 0.5
  grad_clip: 1.0
  log_every: 50
  temporal_horizon: 4
  val_max_batches: 32
  checkpoint_every_steps: 500
  use_ema_teacher: true
  use_masked_modeling: true
  use_temporal_contrast: true
  use_cross_modal: true
