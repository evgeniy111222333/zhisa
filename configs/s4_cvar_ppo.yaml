# S4-CVaR: CVaR-Constrained PPO via Lagrangian dual.
# PPO with an extra CVaR(alpha) risk constraint enforced by
# a Lagrangian multiplier ``lambda_cvar``:
#   L(pi, lambda) = L_ppo - lambda * max(0, -CVaR_alpha - threshold)
#   lambda <- clip(lambda + lr_lambda * max(0, -CVaR_alpha - threshold), 0, lambda_max)
seed: 0
device: cpu
bars: 4000
chart_window: 16
image_size: 32
n_regime_states: 4

# PPO hyperparameters
n_iterations: 5
n_episodes: 4
max_steps_per_episode: 200
n_epochs: 4
minibatch_size: 64
clip_ratio: 0.2
value_coef: 0.5
entropy_coef: 0.01
gamma: 0.99
gae_lambda: 0.95
grad_clip: 1.0
target_kl: 0.05
log_every: 1

# CVaR constraint
cvar_alpha: 0.1            # tail level (worst 10%)
cvar_threshold: 0.1        # max acceptable loss
cvar_lambda_init: 0.0      # start with no penalty
cvar_lambda_lr: 0.05       # dual ascent learning rate
cvar_lambda_max: 100.0     # cap to prevent runaway
cvar_warmup_iters: 0       # iterations before lambda starts updating

env_cfg:
  episode_length: 200
  fee_bps: 4.0
  slippage_bps_per_unit: 1.5
  max_leverage: 3.0
  window: 16
  image_size: 32
