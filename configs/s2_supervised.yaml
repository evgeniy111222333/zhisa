# S2 supervised multi-task training
seed: 0
device: cpu
epochs: 2
batch_size: 32
chart_window: 32
image_size: 32

optim:
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: cosine
  warmup_steps: 100
  t_max: 2000
  step_size: 500
  step_gamma: 0.5

loss_weights:
  direction: 1.0
  volatility: 0.5
  regime: 0.3
  return_pred: 0.5
  policy: 1.0
  value: 0.5
